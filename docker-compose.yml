version: '3.8'
services:
  db:
    image: postgres:14
    container_name: tasktrackr-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasktrackr
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

